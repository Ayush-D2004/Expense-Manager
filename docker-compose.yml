services:
  db:
    image: postgres:15-alpine
    container_name: expense_manager_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: expensemanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: expense_manager_backend
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@db:5432/expensemanager
      SECRET_KEY: ${SECRET_KEY:-AyushDhoble@123}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      # Use env variables for API keys when running in production
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: expense_manager_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
